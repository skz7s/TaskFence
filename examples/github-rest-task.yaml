# Example TaskFence task file for the bounded GitHub REST connector.
#
# This file is for validation and configuration reference. Running it requires
# a real repository and a gateway-side token exported as:
#
#   TASKFENCE_GATEWAY_SECRET_GITHUB_TOKEN=...

id: "github-rest-demo"
goal: "Read a GitHub issue through the bounded gateway connector"
workspace: "./repo"

agent:
  type: "generic"
  command: "/usr/bin/true"

sandbox:
  type: "docker"
  image: "debian:bookworm-slim"

permissions:
  paths:
    read:
      - "./repo/README.md"
    write:
      - "./repo/src"
  commands:
    allow:
      - "/usr/bin/true"
  network:
    default: "deny"
    allow_domains:
      - "api.github.com"
  tools:
    allow:
      - "github.read_issue"
      - "egress.fetch"
    approval_required:
      - "github.create_branch"
      - "github.commit_file"
      - "github.create_pr"
      - "github.update_pr"
      - "github.comment_issue"
      - "github.comment_report"
  budget:
    allow:
      - kind: "gateway_calls"
        max_amount: 8

secrets:
  expose_to_agent: false
  available_to_gateway:
    - name: "github_token"
      use_for:
        - "github.read_issue"
        - "github.create_branch"
        - "github.commit_file"
        - "github.create_pr"
        - "github.update_pr"
        - "github.comment_issue"
        - "github.comment_report"

gateway:
  mode: "local_listener"
  egress:
    allow_domains: true
  tools:
    - protocol: "http"
      tool: "egress"
      operation: "fetch"
      connector:
        type: "unsupported"
        kind: "egress"
    - protocol: "mcp"
      tool: "github"
      operation: "read_issue"
      connector:
        type: "github_rest"
        repository: "owner/repo"
      secret_refs:
        - name: "github_token"
          parameter: "authorization"
          scope: "github.read_issue"
    - protocol: "mcp"
      tool: "github"
      operation: "create_pr"
      connector:
        type: "github_rest"
        repository: "owner/repo"
      secret_refs:
        - name: "github_token"
          parameter: "authorization"
          scope: "github.create_pr"
    - protocol: "mcp"
      tool: "github"
      operation: "create_branch"
      connector:
        type: "github_rest"
        repository: "owner/repo"
      secret_refs:
        - name: "github_token"
          parameter: "authorization"
          scope: "github.create_branch"
    - protocol: "mcp"
      tool: "github"
      operation: "commit_file"
      connector:
        type: "github_rest"
        repository: "owner/repo"
      secret_refs:
        - name: "github_token"
          parameter: "authorization"
          scope: "github.commit_file"
    - protocol: "mcp"
      tool: "github"
      operation: "update_pr"
      connector:
        type: "github_rest"
        repository: "owner/repo"
      secret_refs:
        - name: "github_token"
          parameter: "authorization"
          scope: "github.update_pr"
    - protocol: "mcp"
      tool: "github"
      operation: "comment_issue"
      connector:
        type: "github_rest"
        repository: "owner/repo"
      secret_refs:
        - name: "github_token"
          parameter: "authorization"
          scope: "github.comment_issue"
    - protocol: "mcp"
      tool: "github"
      operation: "comment_report"
      connector:
        type: "github_rest"
        repository: "owner/repo"
      secret_refs:
        - name: "github_token"
          parameter: "authorization"
          scope: "github.comment_report"
