name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  msrv:
    name: Minimum supported Rust
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@1.88

      - name: Check workspace with locked dependencies
        run: cargo check --workspace --locked

  rust:
    name: Rust workspace
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --locked

  governance:
    name: Governance and readiness
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check shell syntax
        run: bash -n deploy/manage.sh

      - name: Check generated governance
        run: python3 scripts/governance/build_agents.py --check

      - name: Check governance assets
        run: python3 scripts/governance/check_codex_governance.py

      - name: Print readiness checklist
        run: bash deploy/manage.sh readiness
